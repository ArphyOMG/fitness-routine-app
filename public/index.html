<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #161616; --bg3: #1e1e1e;
    --border: #2a2a2a; --border2: #333;
    --text: #e8e8e8; --text2: #999; --text3: #555;
    --accent: #e84400; --accent2: #ff6a35; --accent-dim: rgba(232,68,0,0.12);
    --green: #22c55e;
    --panel-w: 420px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Noto Sans KR', sans-serif;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; overflow-x: hidden; }

  /* AUTH */
  #authScreen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
  }
  .auth-logo { font-family: var(--font-display); font-size: 52px; letter-spacing: 6px; }
  .auth-logo span { color: var(--accent); }
  .auth-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text3); letter-spacing: 3px; margin-top: -20px; }
  .auth-divider { width: 1px; height: 40px; background: var(--border2); }
  .google-btn {
    display: flex; align-items: center; gap: 12px;
    background: none; border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
    padding: 14px 28px; cursor: pointer; letter-spacing: 1px; transition: all .2s;
  }
  .google-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  #loadingBar {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); z-index: 999;
    transform: scaleX(0); transform-origin: left;
    transition: transform .4s ease; display: none;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
  }
  .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 3px; line-height: 1; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-name { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; }
  .header-btn { background: none; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font-mono); font-size: 11px; padding: 6px 14px; cursor: pointer; letter-spacing: 1px; transition: all .2s; }
  .header-btn:hover { border-color: var(--accent); color: var(--accent); }
  .header-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--text3); font-family: var(--font-mono); font-size: 10px; padding: 5px 10px; cursor: pointer; letter-spacing: 1px; transition: all .2s; }
  .logout-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 56px); }
  .main-area { flex: 1; overflow-y: auto; padding: 24px; transition: margin-right .3s ease; }
  .main-area.shifted { margin-right: var(--panel-w); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 10px 14px 10px 38px; outline: none; transition: border-color .2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: none; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font-mono); font-size: 11px; padding: 6px 14px; cursor: pointer; letter-spacing: 1px; transition: all .2s; }
  .filter-btn:hover { border-color: var(--text2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .card { background: var(--bg2); border: 1px solid var(--border); padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border2); transition: background .2s; }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card:hover::before, .card.active::before { background: var(--accent); }
  .card.active { border-color: var(--accent); background: var(--bg3); }
  .card-cat { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .card-muscle { font-size: 12px; color: var(--text2); }
  .card-equip { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 10px; }
  .no-results { color: var(--text3); font-family: var(--font-mono); font-size: 13px; padding: 40px 0; text-align: center; }

  /* PANEL */
  .panel { position: fixed; right: 0; top: 56px; bottom: 0; width: var(--panel-w); background: var(--bg2); border-left: 1px solid var(--border2); display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s ease; z-index: 200; }
  .panel.open { transform: translateX(0); }
  .panel-header { padding: 20px 24px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; transition: color .2s; }
  .panel-close:hover { color: var(--text); }
  .panel-cat { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; }
  .panel-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-right: 30px; }
  .panel-muscle { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .tabs { display: flex; }
  .tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-family: var(--font-mono); font-size: 10px; padding: 10px 0; cursor: pointer; letter-spacing: 1px; transition: all .2s; }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* DESC */
  .info-block { margin-bottom: 20px; }
  .info-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; }
  .info-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .tips-list, .cautions-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .tips-list li, .cautions-list li { font-size: 13px; color: var(--text2); padding-left: 14px; position: relative; line-height: 1.6; }
  .tips-list li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 10px; top: 3px; }
  .cautions-list li::before { content: '!'; position: absolute; left: 0; color: #f59e0b; font-size: 11px; font-weight: 700; }
  .desc-log-btn { width: 100%; margin-top: 8px; background: var(--accent); border: none; color: #fff; font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; padding: 12px; cursor: pointer; transition: background .2s; }
  .desc-log-btn:hover { background: var(--accent2); }

  /* LOG */
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .date-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; flex-shrink: 0; }
  .date-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 7px 10px; outline: none; }
  .date-input:focus { border-color: var(--accent); }
  .sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 32px; gap: 8px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; }
  .set-row { display: grid; grid-template-columns: 36px 1fr 1fr 32px; gap: 8px; margin-bottom: 8px; align-items: center; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .set-num { font-family: var(--font-mono); font-size: 12px; color: var(--text3); text-align: center; padding-top: 10px; }
  .set-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 9px 10px; outline: none; text-align: center; width: 100%; transition: border-color .2s; }
  .set-input:focus { border-color: var(--accent); }
  .set-del { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 14px; cursor: pointer; width: 32px; height: 38px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .set-del:hover { border-color: var(--accent); color: var(--accent); }
  .add-set-btn { width: 100%; background: none; border: 1px dashed var(--border2); color: var(--text3); font-family: var(--font-mono); font-size: 11px; padding: 9px; cursor: pointer; letter-spacing: 1px; margin-top: 4px; transition: all .2s; }
  .add-set-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .save-btn { width: 100%; margin-top: 20px; background: var(--accent); border: none; color: #fff; font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; padding: 13px; cursor: pointer; transition: background .2s; }
  .save-btn:hover { background: var(--accent2); }
  .save-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  /* HIST TAB */
  .hist-empty { color: var(--text3); font-family: var(--font-mono); font-size: 12px; text-align: center; padding: 30px 0; }
  .hist-entry { border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; animation: fadeIn .2s ease; }
  .hist-date-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg3); padding: 8px 12px; font-family: var(--font-mono); font-size: 11px; }
  .hist-date { color: var(--accent); }
  .hist-del { background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; transition: color .2s; padding: 2px 4px; }
  .hist-del:hover { color: var(--accent); }
  .hist-sets { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .hist-set-line { display: flex; gap: 8px; font-family: var(--font-mono); font-size: 12px; color: var(--text2); }
  .hist-set-idx { color: var(--text3); width: 20px; flex-shrink: 0; }

  /* ANALYSIS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); padding: 14px 12px; }
  .stat-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-unit { font-size: 11px; color: var(--text3); margin-left: 2px; }
  .stat-delta { font-family: var(--font-mono); font-size: 10px; margin-top: 5px; }
  .stat-delta.up { color: var(--green); }
  .stat-delta.down { color: var(--accent); }
  .stat-delta.flat { color: var(--text3); }
  .chart-block { margin-bottom: 24px; }
  .chart-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .chart-wrap { background: var(--bg3); border: 1px solid var(--border); padding: 12px; position: relative; height: 160px; }
  .analysis-empty { color: var(--text3); font-family: var(--font-mono); font-size: 12px; text-align: center; padding: 50px 0; line-height: 2.2; }

  /* HIST PAGE */
  .hist-page { padding: 24px; }
  .hist-page-title { font-family: var(--font-display); font-size: 36px; letter-spacing: 3px; margin-bottom: 24px; }
  .hist-page-title span { color: var(--accent); }
  .hist-group { margin-bottom: 32px; }
  .hist-group-date { font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
  .hist-group-entries { display: flex; flex-direction: column; gap: 10px; }
  .hist-item { background: var(--bg2); border: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 16px; align-items: flex-start; }
  .hist-item-name { font-weight: 700; font-size: 14px; min-width: 140px; flex-shrink: 0; }
  .hist-item-tags { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .set-tag { background: var(--bg3); border: 1px solid var(--border2); font-family: var(--font-mono); font-size: 11px; color: var(--text2); padding: 3px 8px; }
  .hist-item-del { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; transition: color .2s; padding: 2px; flex-shrink: 0; }
  .hist-item-del:hover { color: var(--accent); }
  .hist-empty-page { text-align: center; color: var(--text3); font-family: var(--font-mono); font-size: 13px; padding: 80px 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--green); color: #000; font-family: var(--font-mono); font-size: 12px; padding: 10px 20px; letter-spacing: 1px; z-index: 999; transition: transform .3s ease, opacity .3s ease; opacity: 0; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  @media (max-width: 768px) {
    .main-area.shifted { margin-right: 0; }
    .panel { width: 100%; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .card { padding: 14px; }
    header { padding: 0 16px; }
    .main-area { padding: 16px; }
    .user-name { display: none; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:none">
  <div>
    <div class="auth-logo">IRON<span> LOG</span></div>
    <div class="auth-sub">운동 기록 트래커</div>
  </div>
  <div class="auth-divider"></div>
  <button class="google-btn" onclick="window.loginWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 계속하기
  </button>
</div>

<div id="loadingBar"></div>

<!-- APP -->
<div id="appScreen" style="display:none">
  <header>
    <div class="logo">IRON<span>&nbsp;LOG</span></div>
    <div class="header-right">
      <span class="user-name" id="userInfo"></span>
      <button class="header-btn" id="histPageBtn">기록 이력</button>
      <button class="logout-btn" onclick="window.logout()">로그아웃</button>
    </div>
  </header>
  <div class="layout">
    <div class="main-area" id="mainArea">
      <div id="homeView">
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input type="text" id="searchInput" placeholder="운동 검색...">
          </div>
          <div class="filters" id="filterBtns">
            <button class="filter-btn active" data-cat="전체">전체</button>
            <button class="filter-btn" data-cat="푸시">푸시</button>
            <button class="filter-btn" data-cat="풀">풀</button>
            <button class="filter-btn" data-cat="하체">하체</button>
            <button class="filter-btn" data-cat="코어">코어</button>
          </div>
        </div>
        <div class="grid" id="exerciseGrid"></div>
      </div>
      <div id="histPageView" style="display:none" class="hist-page">
        <div class="hist-page-title">기록 <span>이력</span></div>
        <div id="histPageContent"></div>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-header" id="panelHeader"></div>
      <div class="panel-body" id="panelBody"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey: "AIzaSyB58Oh2LLiHkMhDyq5-tdaqNbGB4dbzk_Y",
  authDomain: "iron-log-bdfee.firebaseapp.com",
  projectId: "iron-log-bdfee",
  storageBucket: "iron-log-bdfee.firebasestorage.app",
  messagingSenderId: "381983868463",
  appId: "1:381983868463:web:ec6160d7b96f3a6da868da"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ─── AUTH ───
let currentUser = null;

window.loginWithGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showToast('로그인 실패: ' + e.message); }
};
window.logout = async () => { await signOut(auth); };

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userInfo').textContent = user.displayName || user.email;
    LogStore.invalidate();
    renderGrid();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

// ─── LOGSTORE (Firestore) ───
const LogStore = {
  _cache: null,
  invalidate() { this._cache = null; },
  _col() { return collection(db, 'users', currentUser.uid, 'logs'); },
  async getLogs() {
    if (this._cache) return this._cache;
    const snap = await getDocs(query(this._col(), orderBy('date','desc')));
    this._cache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    return this._cache;
  },
  async getLogsByExercise(eid) {
    const all = await this.getLogs();
    return all.filter(l => l.exerciseId === eid).slice(0, 5);
  },
  async getAllLogsByDate() {
    const all = await this.getLogs();
    const map = {};
    all.forEach(l => { if (!map[l.date]) map[l.date]=[]; map[l.date].push(l); });
    return Object.entries(map);
  },
  async addLog(log) {
    const ref = await addDoc(this._col(), log);
    this._cache = null;
    return ref.id;
  },
  async deleteLog(id) {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'logs', id));
    this._cache = null;
  }
};

// ─── EXERCISES ───
const EXERCISES = [
  { id:'rdl', name:'루마니안 데드리프트', category:'풀', primaryMuscle:'햄스트링, 둔근', equipment:'바벨',
    desc:'루마니안 데드리프트는 햄스트링과 둔근을 집중적으로 단련하는 힌지 패턴 운동입니다. 바를 몸 가까이 유지하며 골반을 뒤로 밀어 내리는 것이 핵심입니다.',

// ─── STATE ───
let state = {
  search:'', cat:'전체', activeEx:null,
  activeTab:'desc', sets:[{reps:'',weight:''}],
  logDate:today(), view:'home'
};

function today() { return new Date().toISOString().slice(0,10); }

function setLoading(on) {
  const b = document.getElementById('loadingBar');
  if (on) { b.style.display='block'; b.style.transform='scaleX(0)'; requestAnimationFrame(()=>b.style.transform='scaleX(0.85)'); }
  else { b.style.transform='scaleX(1)'; setTimeout(()=>{ b.style.display='none'; b.style.transform='scaleX(0)'; }, 350); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ─── GRID ───
function renderGrid() {
  const grid = document.getElementById('exerciseGrid');
  let list = EXERCISES;
  if (state.cat !== '전체') list = list.filter(e => e.category === state.cat);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(e => e.name.toLowerCase().includes(q) || e.primaryMuscle.includes(q));
  }
  if (!list.length) { grid.innerHTML='<div class="no-results">검색 결과가 없습니다.</div>'; return; }
  grid.innerHTML = list.map(e => `
    <div class="card ${state.activeEx?.id===e.id?'active':''}" data-id="${e.id}">
      <div class="card-cat">${e.category}</div>
      <div class="card-name">${e.name}</div>
      <div class="card-muscle">${e.primaryMuscle}</div>
      <div class="card-equip">${e.equipment}</div>
    </div>`).join('');
  grid.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => openPanel(EXERCISES.find(e => e.id===c.dataset.id)))
  );
}

function renderFilters() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===state.cat));
}

function openPanel(ex) {
  state.activeEx=ex; state.activeTab='desc';
  state.sets=[{reps:'',weight:''}]; state.logDate=today();
  document.getElementById('panel').classList.add('open');
  document.getElementById('mainArea').classList.add('shifted');
  renderPanel(); renderGrid();
}

function closePanel() {
  state.activeEx=null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('mainArea').classList.remove('shifted');
  renderGrid();
}
window.closePanel = closePanel;

async function renderPanel() {
  if (!state.activeEx) return;
  const ex = state.activeEx;
  document.getElementById('panelHeader').innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-cat">${ex.category} · ${ex.equipment}</div>
    <div class="panel-name">${ex.name}</div>
    <div class="panel-muscle">주동근: ${ex.primaryMuscle}</div>
    <div class="tabs">
      <button class="tab-btn ${state.activeTab==='desc'?'active':''}" onclick="switchTab('desc')">설명</button>
      <button class="tab-btn ${state.activeTab==='log'?'active':''}" onclick="switchTab('log')">기록하기</button>
      <button class="tab-btn ${state.activeTab==='hist'?'active':''}" onclick="switchTab('hist')">기록 이력</button>
      <button class="tab-btn ${state.activeTab==='analysis'?'active':''}" onclick="switchTab('analysis')">분석</button>
    </div>`;
  const body = document.getElementById('panelBody');
  if (state.activeTab==='desc') { body.innerHTML=renderDescTab(ex); return; }
  if (state.activeTab==='log')  { body.innerHTML=renderLogTab();    return; }
  setLoading(true);
  if (state.activeTab==='hist') {
    const logs = await LogStore.getLogsByExercise(ex.id);
    body.innerHTML = renderHistTab(logs);
  }
  if (state.activeTab==='analysis') {
    const all = await LogStore.getLogs();
    const logs = all.filter(l=>l.exerciseId===ex.id).sort((a,b)=>a.date.localeCompare(b.date));
    body.innerHTML = renderAnalysisTab(logs);
    if (logs.length >= 2) drawCharts(logs);
  }
  setLoading(false);
}

function renderDescTab(ex) {
  return `
    <div class="info-block"><div class="info-label">운동 설명</div><div class="info-text">${ex.desc}</div></div>
    <div class="info-block"><div class="info-label">자세 팁</div><ul class="tips-list">${ex.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    <div class="info-block"><div class="info-label">주의사항</div><ul class="cautions-list">${ex.cautions.map(c=>`<li>${c}</li>`).join('')}</ul></div>
    <button class="desc-log-btn" onclick="switchTab('log')">+ 기록하기</button>`;
}

function renderLogTab() {
  const rows = state.sets.map((s,i) => `
    <div class="set-row">
      <div class="set-num">S${i+1}</div>
      <input class="set-input" type="number" min="0" placeholder="횟수" value="${s.reps}" oninput="updateSet(${i},'reps',this.value)">
      <input class="set-input" type="number" min="0" step="0.5" placeholder="무게 kg" value="${s.weight}" oninput="updateSet(${i},'weight',this.value)">
      <button class="set-del" onclick="deleteSet(${i})">✕</button>
    </div>`).join('');
  return `
    <div class="date-row">
      <span class="date-label">날짜</span>
      <input class="date-input" type="date" value="${state.logDate}" onchange="state.logDate=this.value">
    </div>
    <div class="sets-header"><span></span><span style="text-align:center">횟수</span><span style="text-align:center">무게(kg)</span><span></span></div>
    <div id="setsList">${rows}</div>
    <button class="add-set-btn" onclick="addSet()">+ 세트 추가</button>
    <button class="save-btn" onclick="saveLog()">저장</button>`;
}

function renderHistTab(logs) {
  if (!logs.length) return '<div class="hist-empty">기록이 없습니다</div>';
  return logs.map(l => `
    <div class="hist-entry">
      <div class="hist-date-row"><span class="hist-date">${l.date}</span><button class="hist-del" onclick="deleteLogAndRefresh('${l.id}')">삭제</button></div>
      <div class="hist-sets">${l.sets.map((s,i)=>`<div class="hist-set-line"><span class="hist-set-idx">S${i+1}</span><span>${s.reps}회 · ${s.weight}kg</span></div>`).join('')}</div>
    </div>`).join('');
}

// ─── ANALYTICS ───
function epley(w,r) { return r===1?w:Math.round(w*(1+r/30)); }

function renderAnalysisTab(logs) {
  if (logs.length < 2) return `<div class="analysis-empty">기록이 2개 이상 있어야<br>분석 데이터를 볼 수 있습니다.<br><br>기록하기 탭에서 운동을 기록해보세요!</div>`;
  const data = logs.map(l=>({ date:l.date, volume:l.sets.reduce((s,x)=>s+x.reps*x.weight,0), est1rm:Math.max(...l.sets.map(s=>epley(s.weight,s.reps))) }));
  const latest=data[data.length-1], prev=data[data.length-2];
  const maxVol=Math.max(...data.map(d=>d.volume)), max1rm=Math.max(...data.map(d=>d.est1rm));
  function delta(curr,prev,unit) {
    const d=curr-prev; if(d===0) return `<div class="stat-delta flat">— 변동 없음</div>`;
    return `<div class="stat-delta ${d>0?'up':'down'}">${d>0?'▲':'▼'} ${d>0?'+':''}${d}${unit}</div>`;
  }
  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">최신 볼륨</div><div class="stat-value">${latest.volume.toLocaleString()}<span class="stat-unit">kg</span></div>${delta(latest.volume,prev.volume,'kg')}</div>
      <div class="stat-card"><div class="stat-label">추정 1RM</div><div class="stat-value">${latest.est1rm}<span class="stat-unit">kg</span></div>${delta(latest.est1rm,prev.est1rm,'kg')}</div>
      <div class="stat-card"><div class="stat-label">최고 볼륨</div><div class="stat-value">${maxVol.toLocaleString()}<span class="stat-unit">kg</span></div><div class="stat-delta flat">전체 최고</div></div>
      <div class="stat-card"><div class="stat-label">최고 1RM</div><div class="stat-value">${max1rm}<span class="stat-unit">kg</span></div><div class="stat-delta flat">전체 최고</div></div>
    </div>
    <div class="chart-block"><div class="chart-label">날짜별 볼륨 추이</div><div class="chart-wrap"><canvas id="chartVolume"></canvas></div></div>
    <div class="chart-block"><div class="chart-label">추정 1RM 추이 (Epley)</div><div class="chart-wrap"><canvas id="chart1RM"></canvas></div></div>`;
}

let _charts={};
function drawCharts(logs) {
  Object.values(_charts).forEach(c=>c.destroy()); _charts={};
  const data=logs.map(l=>({ label:l.date.slice(5), volume:l.sets.reduce((s,x)=>s+x.reps*x.weight,0), est1rm:Math.max(...l.sets.map(s=>epley(s.weight,s.reps))) }));
  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e1e1e',borderColor:'#333',borderWidth:1,titleColor:'#999',bodyColor:'#e8e8e8',titleFont:{family:'IBM Plex Mono',size:10},bodyFont:{family:'IBM Plex Mono',size:12}}},scales:{x:{grid:{color:'#1e1e1e'},ticks:{color:'#555',font:{family:'IBM Plex Mono',size:9},maxRotation:0}},y:{grid:{color:'#1e1e1e'},ticks:{color:'#555',font:{family:'IBM Plex Mono',size:9}}}}};
  function ds(vals,color,label){return{label,data:vals,borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:4,pointBackgroundColor:color,pointBorderColor:'#0f0f0f',pointBorderWidth:2,tension:.3,fill:true};}
  _charts.vol=new Chart(document.getElementById('chartVolume'),{type:'line',data:{labels:data.map(d=>d.label),datasets:[ds(data.map(d=>d.volume),'#e84400','볼륨')]},options:opts});
  _charts.rm =new Chart(document.getElementById('chart1RM'),  {type:'line',data:{labels:data.map(d=>d.label),datasets:[ds(data.map(d=>d.est1rm), '#22c55e','1RM')]}, options:opts});
}

// ─── CONTROLS ───
window.switchTab    = (t)    => { state.activeTab=t; renderPanel(); };
window.updateSet    = (i,f,v)=> { state.sets[i][f]=v; };
window.addSet       = ()     => { state.sets.push({reps:'',weight:''}); renderPanel(); };
window.deleteSet    = (i)    => { if(state.sets.length===1)return; state.sets.splice(i,1); renderPanel(); };

window.saveLog = async () => {
  const valid = state.sets.filter(s=>s.reps!==''||s.weight!=='');
  if (!valid.length) { showToast('세트 정보를 입력하세요'); return; }
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.disabled=true; btn.textContent='저장 중...'; }
  try {
    await LogStore.addLog({ date:state.logDate, exerciseId:state.activeEx.id, sets:valid.map(s=>({reps:Number(s.reps)||0,weight:Number(s.weight)||0})) });
    state.sets=[{reps:'',weight:''}];
    showToast('저장되었습니다 ✓');
    renderPanel();
  } catch(e) {
    showToast('저장 실패');
    if(btn){btn.disabled=false;btn.textContent='저장';}
  }
};

window.deleteLogAndRefresh = async (id) => {
  await LogStore.deleteLog(id);
  if (state.view==='hist') renderHistPage();
  else renderPanel();
};

// ─── HISTORY PAGE ───
async function renderHistPage() {
  setLoading(true);
  const groups = await LogStore.getAllLogsByDate();
  const cont = document.getElementById('histPageContent');
  if (!groups.length) { cont.innerHTML='<div class="hist-empty-page">아직 기록이 없습니다.<br>운동을 선택하고 첫 기록을 남겨보세요!</div>'; setLoading(false); return; }
  cont.innerHTML = groups.map(([date,logs])=>`
    <div class="hist-group">
      <div class="hist-group-date">${date}</div>
      <div class="hist-group-entries">
        ${logs.map(l=>{
          const ex=EXERCISES.find(e=>e.id===l.exerciseId);
          const tags=l.sets.map((s,i)=>`<span class="set-tag">S${i+1} ${s.reps}회·${s.weight}kg</span>`).join('');
          return `<div class="hist-item"><div class="hist-item-name">${ex?ex.name:l.exerciseId}</div><div class="hist-item-tags">${tags}</div><button class="hist-item-del" onclick="deleteLogAndRefresh('${l.id}')">✕</button></div>`;
        }).join('')}
      </div>
    </div>`).join('');
  setLoading(false);
}

function showHistPage() {
  state.view='hist'; closePanel();
  document.getElementById('homeView').style.display='none';
  document.getElementById('histPageView').style.display='block';
  document.getElementById('histPageBtn').classList.add('active');
  renderHistPage();
}
function showHomePage() {
  state.view='home';
  document.getElementById('homeView').style.display='block';
  document.getElementById('histPageView').style.display='none';
  document.getElementById('histPageBtn').classList.remove('active');
}

// ─── INIT ───
document.getElementById('searchInput').addEventListener('input', e => { state.search=e.target.value; renderGrid(); });
document.getElementById('filterBtns').addEventListener('click', e => {
  if (e.target.dataset.cat) { state.cat=e.target.dataset.cat; renderFilters(); renderGrid(); }
});
document.getElementById('histPageBtn').addEventListener('click', () => {
  if (state.view==='hist') showHomePage(); else showHistPage();
});
</script>
</body>
</html>
