<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #999;
    --text3: #555;
    --accent: #e84400;
    --accent2: #ff6a35;
    --accent-dim: rgba(232,68,0,0.12);
    --green: #22c55e;
    --panel-w: 420px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Noto Sans KR', sans-serif;
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 56px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .header-btn {
    background: none; border: 1px solid var(--border2);
    color: var(--text2); font-family: var(--font-mono); font-size: 11px;
    padding: 6px 14px; cursor: pointer; letter-spacing: 1px;
    transition: all .2s;
  }
  .header-btn:hover { border-color: var(--accent); color: var(--accent); }
  .header-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ─── MAIN LAYOUT ─── */
  .layout { display: flex; height: calc(100vh - 56px); }
  .main-area { flex: 1; overflow-y: auto; padding: 24px; transition: margin-right .3s ease; }
  .main-area.shifted { margin-right: var(--panel-w); }

  /* ─── SEARCH + FILTER ─── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; background: var(--bg2); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-mono); font-size: 13px;
    padding: 10px 14px 10px 38px; outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 14px; pointer-events: none;
  }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: none; border: 1px solid var(--border2);
    color: var(--text2); font-family: var(--font-mono); font-size: 11px;
    padding: 6px 14px; cursor: pointer; letter-spacing: 1px;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--text2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ─── EXERCISE GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 18px; cursor: pointer; transition: all .2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--border2);
    transition: background .2s;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card:hover::before { background: var(--accent); }
  .card.active { border-color: var(--accent); background: var(--bg3); }
  .card.active::before { background: var(--accent); }
  .card-cat {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
    color: var(--accent); margin-bottom: 8px; text-transform: uppercase;
  }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .card-muscle { font-size: 12px; color: var(--text2); }
  .card-equip {
    font-family: var(--font-mono); font-size: 10px; color: var(--text3);
    margin-top: 10px; letter-spacing: .5px;
  }
  .no-results { color: var(--text3); font-family: var(--font-mono); font-size: 13px; padding: 40px 0; text-align: center; }

  /* ─── SIDE PANEL ─── */
  .panel {
    position: fixed; right: 0; top: 56px; bottom: 0;
    width: var(--panel-w); background: var(--bg2);
    border-left: 1px solid var(--border2);
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .3s ease;
    z-index: 200;
  }
  .panel.open { transform: translateX(0); }
  .panel-header {
    padding: 20px 24px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--text3);
    font-size: 20px; cursor: pointer; line-height: 1;
    transition: color .2s;
  }
  .panel-close:hover { color: var(--text); }
  .panel-cat {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
    color: var(--accent); margin-bottom: 6px;
  }
  .panel-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-right: 30px; }
  .panel-muscle { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .panel-equip { font-family: var(--font-mono); font-size: 11px; color: var(--text3); margin-bottom: 16px; }

  /* TABS */
  .tabs { display: flex; gap: 0; }
  .tab-btn {
    flex: 1; background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text3); font-family: var(--font-mono); font-size: 11px;
    padding: 10px 0; cursor: pointer; letter-spacing: 1px; transition: all .2s;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* DESC TAB */
  .info-block { margin-bottom: 20px; }
  .info-label {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
    color: var(--text3); margin-bottom: 8px; text-transform: uppercase;
  }
  .info-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .tips-list, .cautions-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .tips-list li, .cautions-list li {
    font-size: 13px; color: var(--text2); padding-left: 14px; position: relative; line-height: 1.6;
  }
  .tips-list li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 10px; top: 3px; }
  .cautions-list li::before { content: '!'; position: absolute; left: 0; color: #f59e0b; font-size: 11px; font-weight: 700; }
  .desc-log-btn {
    width: 100%; margin-top: 8px;
    background: var(--accent); border: none; color: #fff;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px;
    padding: 12px; cursor: pointer; transition: background .2s;
  }
  .desc-log-btn:hover { background: var(--accent2); }

  /* LOG TAB */
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .date-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; flex-shrink: 0; }
  .date-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
    padding: 7px 10px; outline: none;
  }
  .date-input:focus { border-color: var(--accent); }
  .sets-header {
    display: grid; grid-template-columns: 36px 1fr 1fr 32px;
    gap: 8px; margin-bottom: 8px;
    font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 1px;
  }
  .set-row {
    display: grid; grid-template-columns: 36px 1fr 1fr 32px;
    gap: 8px; margin-bottom: 8px; align-items: center;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .set-num {
    font-family: var(--font-mono); font-size: 12px; color: var(--text3);
    text-align: center; padding-top: 10px;
  }
  .set-input {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-mono); font-size: 13px;
    padding: 9px 10px; outline: none; text-align: center; width: 100%;
    transition: border-color .2s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-del {
    background: none; border: 1px solid var(--border);
    color: var(--text3); font-size: 14px; cursor: pointer;
    width: 32px; height: 38px; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .set-del:hover { border-color: var(--accent); color: var(--accent); }
  .add-set-btn {
    width: 100%; background: none; border: 1px dashed var(--border2);
    color: var(--text3); font-family: var(--font-mono); font-size: 11px;
    padding: 9px; cursor: pointer; letter-spacing: 1px; margin-top: 4px;
    transition: all .2s;
  }
  .add-set-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .save-btn {
    width: 100%; margin-top: 20px;
    background: var(--accent); border: none; color: #fff;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px;
    padding: 13px; cursor: pointer; transition: background .2s;
  }
  .save-btn:hover { background: var(--accent2); }
  .save-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green); color: #000; font-family: var(--font-mono); font-size: 12px;
    padding: 10px 20px; letter-spacing: 1px; z-index: 999;
    transition: transform .3s ease, opacity .3s ease; opacity: 0;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* HISTORY TAB */
  .hist-empty { color: var(--text3); font-family: var(--font-mono); font-size: 12px; text-align: center; padding: 30px 0; }
  .hist-entry {
    border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden;
    animation: fadeIn .2s ease;
  }
  .hist-date-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3); padding: 8px 12px;
    font-family: var(--font-mono); font-size: 11px;
  }
  .hist-date { color: var(--accent); }
  .hist-del {
    background: none; border: none; color: var(--text3); font-size: 12px;
    cursor: pointer; transition: color .2s; padding: 2px 4px;
  }
  .hist-del:hover { color: var(--accent); }
  .hist-sets { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .hist-set-line {
    display: flex; gap: 8px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text2);
  }
  .hist-set-idx { color: var(--text3); width: 20px; flex-shrink: 0; }
  .hist-set-val { color: var(--text); }

  /* ─── HISTORY PAGE ─── */
  .hist-page { padding: 24px; }
  .hist-page-title {
    font-family: var(--font-display);
    font-size: 36px; letter-spacing: 3px; margin-bottom: 24px;
    color: var(--text);
  }
  .hist-page-title span { color: var(--accent); }
  .hist-group { margin-bottom: 32px; }
  .hist-group-date {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px;
    color: var(--accent); border-bottom: 1px solid var(--border);
    padding-bottom: 8px; margin-bottom: 12px;
  }
  .hist-group-entries { display: flex; flex-direction: column; gap: 10px; }
  .hist-item {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 14px 16px; display: flex; gap: 16px; align-items: flex-start;
    transition: border-color .2s;
  }
  .hist-item:hover { border-color: var(--border2); }
  .hist-item-name { font-weight: 700; font-size: 14px; min-width: 140px; flex-shrink: 0; }
  .hist-item-tags { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .set-tag {
    background: var(--bg3); border: 1px solid var(--border2);
    font-family: var(--font-mono); font-size: 11px; color: var(--text2);
    padding: 3px 8px;
  }
  .hist-item-del {
    background: none; border: none; color: var(--text3); font-size: 14px;
    cursor: pointer; transition: color .2s; padding: 2px; flex-shrink: 0;
  }
  .hist-item-del:hover { color: var(--accent); }
  .hist-empty-page { text-align: center; color: var(--text3); font-family: var(--font-mono); font-size: 13px; padding: 80px 0; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  /* ─── MOBILE ─── */
  @media (max-width: 768px) {
    .main-area.shifted { margin-right: 0; }
    .panel { width: 100%; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .card { padding: 14px; }
    .toolbar { gap: 8px; }
    header { padding: 0 16px; }
    .main-area { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">IRON<span>&nbsp;LOG</span></div>
  <button class="header-btn" id="histPageBtn">기록 이력</button>
</header>

<div class="layout">
  <div class="main-area" id="mainArea">
    <!-- HOME VIEW -->
    <div id="homeView">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="운동 검색...">
        </div>
        <div class="filters" id="filterBtns">
          <button class="filter-btn active" data-cat="전체">전체</button>
          <button class="filter-btn" data-cat="푸시">푸시</button>
          <button class="filter-btn" data-cat="풀">풀</button>
          <button class="filter-btn" data-cat="하체">하체</button>
          <button class="filter-btn" data-cat="코어">코어</button>
        </div>
      </div>
      <div class="grid" id="exerciseGrid"></div>
    </div>

    <!-- HISTORY PAGE VIEW -->
    <div id="histPageView" style="display:none" class="hist-page">
      <div class="hist-page-title">기록 <span>이력</span></div>
      <div id="histPageContent"></div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="panel" id="panel">
    <div class="panel-header" id="panelHeader"></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───
const EXERCISES = [
  { id:'rdl', name:'루마니안 데드리프트', category:'풀', primaryMuscle:'햄스트링, 둔근', equipment:'바벨',
    desc:'루마니안 데드리프트는 햄스트링과 둔근을 집중적으로 단련하는 힌지 패턴 운동입니다. 바를 몸 가까이 유지하며 골반을 뒤로 밀어 내리는 것이 핵심입니다. 무릎은 약간 굽힌 상태를 유지하고 허리의 중립 커브를 지켜야 합니다.',
    tips:['바가 항상 정강이와 허벅지에 가깝게 이동하도록 유지', '내려갈 때 햄스트링의 스트레치 느낌을 확인', '올라올 때 둔근으로 밀어올리는 느낌에 집중'],
    cautions:['허리가 둥글게 말리지 않도록 주의', '무릎이 과도하게 앞으로 이동하지 않게 고정'] },
  { id:'latpulldown', name:'랫 풀 다운', category:'풀', primaryMuscle:'광배근, 대원근', equipment:'케이블 머신',
    desc:'랫 풀 다운은 케이블 머신을 이용해 광배근과 대원근을 발달시키는 대표적인 풀 운동입니다. 바를 가슴 상단부까지 당기며 날개뼈를 아래로 모으는 동작이 핵심입니다.',
    tips:['그립 너비는 어깨 너비보다 약간 넓게 설정', '팔꿈치를 몸 옆으로 모으며 광배근 수축 의식', '상체를 약간 뒤로 기울여 수직 당김 효과 극대화'],
    cautions:['과도한 상체 후경 금지, 30도 이내 유지', '반동으로 당기지 말고 천천히 컨트롤'] },
  { id:'barbellrow', name:'바벨 로우', category:'풀', primaryMuscle:'광배근, 승모근, 능형근', equipment:'바벨',
    desc:'바벨 로우는 등 전체를 두껍게 발달시키는 핵심 복합 운동입니다. 상체를 45도 정도 숙이고 바를 배꼽 방향으로 당깁니다.',
    tips:['당길 때 팔꿈치를 뒤로 세게 밀어내는 느낌', '복부에 힘을 주어 척추 중립 유지', '내려놓을 때 광배근이 늘어나는 것 느끼기'],
    cautions:['허리가 과도하게 아치되지 않도록 주의', '반동보다 근육 수축에 집중'] },
  { id:'pendlayrow', name:'펜들레이 로우', category:'풀', primaryMuscle:'광배근, 상부 등', equipment:'바벨',
    desc:'펜들레이 로우는 각 반복마다 바를 바닥에 완전히 내려놓는 변형 바벨 로우입니다. 상부 등과 광배근 발달에 효과적이며 폭발적인 당김으로 근력 향상에 유리합니다.',
    tips:['상체를 바닥과 거의 평행하게 유지', '폭발적으로 당겨 흉추 아래 배꼽 위에 닿게', '매 반복 바닥에 완전히 내려 리셋'],
    cautions:['허리 부담이 크므로 충분한 코어 강화 후 시작', '초보자는 가벼운 무게로 폼 먼저 익히기'] },
  { id:'benchpress', name:'바벨 벤치프레스', category:'푸시', primaryMuscle:'대흉근, 삼두근', equipment:'바벨, 벤치',
    desc:'바벨 벤치프레스는 가슴 근육과 삼두근을 동시에 자극하는 대표 푸시 운동입니다. 어깨 너비보다 약간 넓게 그립하고 가슴 중앙으로 내려 힘차게 밀어올립니다.',
    tips:['날개뼈를 벤치에 단단히 고정해 어깨 안정성 확보', '바를 가슴 아래 부분(유두 아래)에 착지', '발을 바닥에 단단히 고정해 레그 드라이브 활용'],

// ─── STORE ───
const LogStore = {
  _key: 'ironlog_v1',
  _data: null,
  _load() {
    if (!this._data) {
      try { this._data = JSON.parse(localStorage.getItem(this._key)) || []; }
      catch { this._data = []; }
    }
    return this._data;
  },
  _save() { localStorage.setItem(this._key, JSON.stringify(this._data)); },
  getLogs() { return this._load(); },
  getLogsByExercise(eid) {
    return this._load().filter(l => l.exerciseId === eid)
      .sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);
  },
  getAllLogsByDate() {
    const all = this._load().sort((a,b) => b.date.localeCompare(a.date));
    const map = {};
    all.forEach(l => { if (!map[l.date]) map[l.date] = []; map[l.date].push(l); });
    return Object.entries(map);
  },
  addLog(log) { this._load().push(log); this._save(); },
  deleteLog(id) {
    this._data = this._load().filter(l => l.id !== id);
    this._save();
  },
  uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
};

// ─── STATE ───
let state = {
  search: '',
  cat: '전체',
  activeEx: null,
  activeTab: 'desc',
  sets: [{reps:'', weight:''}],
  logDate: today(),
  view: 'home'
};

function today() {
  return new Date().toISOString().slice(0,10);
}

// ─── RENDER ───
function renderGrid() {
  const grid = document.getElementById('exerciseGrid');
  let list = EXERCISES;
  if (state.cat !== '전체') list = list.filter(e => e.category === state.cat);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(e => e.name.toLowerCase().includes(q) || e.primaryMuscle.includes(q));
  }
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = list.map(e => `
    <div class="card ${state.activeEx?.id === e.id ? 'active':''}" data-id="${e.id}">
      <div class="card-cat">${e.category}</div>
      <div class="card-name">${e.name}</div>
      <div class="card-muscle">${e.primaryMuscle}</div>
      <div class="card-equip">${e.equipment}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => openPanel(EXERCISES.find(e => e.id === c.dataset.id)))
  );
}

function renderFilters() {
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === state.cat)
  );
}

function openPanel(ex) {
  state.activeEx = ex;
  state.activeTab = 'desc';
  state.sets = [{reps:'', weight:''}];
  state.logDate = today();
  document.getElementById('panel').classList.add('open');
  document.getElementById('mainArea').classList.add('shifted');
  renderPanel();
  renderGrid();
}

function closePanel() {
  state.activeEx = null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('mainArea').classList.remove('shifted');
  renderGrid();
}

function renderPanel() {
  if (!state.activeEx) return;
  const ex = state.activeEx;
  document.getElementById('panelHeader').innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-cat">${ex.category} · ${ex.equipment}</div>
    <div class="panel-name">${ex.name}</div>
    <div class="panel-muscle">주동근: ${ex.primaryMuscle}</div>
    <div class="tabs">
      <button class="tab-btn ${state.activeTab==='desc'?'active':''}" onclick="switchTab('desc')">설명</button>
      <button class="tab-btn ${state.activeTab==='log'?'active':''}" onclick="switchTab('log')">기록하기</button>
      <button class="tab-btn ${state.activeTab==='hist'?'active':''}" onclick="switchTab('hist')">기록 이력</button>
    </div>
  `;
  const body = document.getElementById('panelBody');
  if (state.activeTab === 'desc') body.innerHTML = renderDescTab(ex);
  if (state.activeTab === 'log') body.innerHTML = renderLogTab();
  if (state.activeTab === 'hist') body.innerHTML = renderHistTab(ex);
}

function renderDescTab(ex) {
  return `
    <div class="info-block">
      <div class="info-label">운동 설명</div>
      <div class="info-text">${ex.desc}</div>
    </div>
    <div class="info-block">
      <div class="info-label">자세 팁</div>
      <ul class="tips-list">${ex.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="info-block">
      <div class="info-label">주의사항</div>
      <ul class="cautions-list">${ex.cautions.map(c=>`<li>${c}</li>`).join('')}</ul>
    </div>
    <button class="desc-log-btn" onclick="switchTab('log')">+ 기록하기</button>
  `;
}

function renderLogTab() {
  const rows = state.sets.map((s,i) => `
    <div class="set-row">
      <div class="set-num">S${i+1}</div>
      <input class="set-input" type="number" min="0" placeholder="횟수" value="${s.reps}"
        onchange="updateSet(${i},'reps',this.value)" oninput="updateSet(${i},'reps',this.value)">
      <input class="set-input" type="number" min="0" step="0.5" placeholder="무게 kg" value="${s.weight}"
        onchange="updateSet(${i},'weight',this.value)" oninput="updateSet(${i},'weight',this.value)">
      <button class="set-del" onclick="deleteSet(${i})">✕</button>
    </div>
  `).join('');
  return `
    <div class="date-row">
      <span class="date-label">날짜</span>
      <input class="date-input" type="date" value="${state.logDate}"
        onchange="state.logDate=this.value">
    </div>
    <div class="sets-header"><span></span><span style="text-align:center">횟수</span><span style="text-align:center">무게(kg)</span><span></span></div>
    <div id="setsList">${rows}</div>
    <button class="add-set-btn" onclick="addSet()">+ 세트 추가</button>
    <button class="save-btn" onclick="saveLog()">저장</button>
  `;
}

function renderHistTab(ex) {
  const logs = LogStore.getLogsByExercise(ex.id);
  if (!logs.length) return '<div class="hist-empty">기록이 없습니다</div>';
  return logs.map(l => `
    <div class="hist-entry">
      <div class="hist-date-row">
        <span class="hist-date">${l.date}</span>
        <button class="hist-del" onclick="deleteLogAndRefresh('${l.id}')">삭제</button>
      </div>
      <div class="hist-sets">
        ${l.sets.map((s,i) => `
          <div class="hist-set-line">
            <span class="hist-set-idx">S${i+1}</span>
            <span class="hist-set-val">${s.reps}회 · ${s.weight}kg</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function switchTab(tab) {
  state.activeTab = tab;
  renderPanel();
}

function updateSet(i, field, val) {
  state.sets[i][field] = val;
}

function addSet() {
  state.sets.push({reps:'', weight:''});
  renderPanel();
}

function deleteSet(i) {
  if (state.sets.length === 1) return;
  state.sets.splice(i, 1);
  renderPanel();
}

function saveLog() {
  const validSets = state.sets.filter(s => s.reps !== '' || s.weight !== '');
  if (!validSets.length) { showToast('세트 정보를 입력하세요'); return; }
  const log = {
    id: LogStore.uid(),
    date: state.logDate,
    exerciseId: state.activeEx.id,
    sets: validSets.map(s => ({ reps: Number(s.reps)||0, weight: Number(s.weight)||0 }))
  };
  LogStore.addLog(log);
  state.sets = [{reps:'', weight:''}];
  showToast('저장되었습니다 ✓');
  renderPanel();
}

function deleteLogAndRefresh(id) {
  LogStore.deleteLog(id);
  if (state.view === 'hist') renderHistPage();
  else renderPanel();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── HISTORY PAGE ───
function renderHistPage() {
  const groups = LogStore.getAllLogsByDate();
  const cont = document.getElementById('histPageContent');
  if (!groups.length) {
    cont.innerHTML = '<div class="hist-empty-page">아직 기록이 없습니다.<br>운동을 선택하고 첫 기록을 남겨보세요!</div>';
    return;
  }
  cont.innerHTML = groups.map(([date, logs]) => `
    <div class="hist-group">
      <div class="hist-group-date">${date}</div>
      <div class="hist-group-entries">
        ${logs.map(l => {
          const ex = EXERCISES.find(e => e.id === l.exerciseId);
          const name = ex ? ex.name : l.exerciseId;
          const tags = l.sets.map((s,i) => `<span class="set-tag">S${i+1} ${s.reps}회·${s.weight}kg</span>`).join('');
          return `
            <div class="hist-item">
              <div class="hist-item-name">${name}</div>
              <div class="hist-item-tags">${tags}</div>
              <button class="hist-item-del" onclick="deleteLogAndRefresh('${l.id}')">✕</button>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function showHistPage() {
  state.view = 'hist';
  closePanel();
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('histPageView').style.display = 'block';
  document.getElementById('histPageBtn').classList.add('active');
  renderHistPage();
}

function showHomePage() {
  state.view = 'home';
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('histPageView').style.display = 'none';
  document.getElementById('histPageBtn').classList.remove('active');
}

// ─── INIT ───
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  renderGrid();
});

document.getElementById('filterBtns').addEventListener('click', e => {
  if (e.target.dataset.cat) {
    state.cat = e.target.dataset.cat;
    renderFilters();
    renderGrid();
  }
});

document.getElementById('histPageBtn').addEventListener('click', () => {
  if (state.view === 'hist') showHomePage();
  else showHistPage();
});

renderGrid();
</script>
</body>
</html>
